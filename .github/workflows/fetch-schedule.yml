name: Fetch Schedule

on:
  schedule:
    - cron: '0 12 * * *'  # ~6 AM CT (UTC-6 CST) / 7 AM CDT
    - cron: '0 0 * * *'   # ~6 PM CT (UTC-6 CST) / 7 PM CDT
  workflow_dispatch:        # allow manual run

jobs:
  fetch-schedule:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run fetch-schedule script
        run: pnpm fetch-schedule

      - name: Commit and push data files (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/schedule.json data/standings.json
          git diff --staged --quiet || git commit -m "chore: update schedule data [skip ci]"
          git push

      - name: Trigger ISR revalidation
        run: |
          curl -X POST "${{ secrets.VERCEL_REVALIDATE_URL }}" \
            -H "x-revalidate-token: ${{ secrets.REVALIDATE_SECRET }}" \
            --fail \
            --silent \
            --show-error
        env:
          VERCEL_REVALIDATE_URL: ${{ secrets.VERCEL_REVALIDATE_URL }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
